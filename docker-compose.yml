version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emr-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://default:default@mongo:27017/emr-stikes-katolik-paulo?authSource=admin
    depends_on:
      - mongo
    volumes:
      # Preserve the uploads folder so it doesn't get wiped out when the container is rebuilt
      - uploads_data:/app/public/uploads

  mongo:
    image: mongo:latest
    container_name: emr-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=default
      - MONGO_INITDB_ROOT_PASSWORD=default
      - MONGO_INITDB_DATABASE=emr-stikes-katolik-paulo
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  uploads_data:
